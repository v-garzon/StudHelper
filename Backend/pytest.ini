[tool:pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --strict-config
    --disable-warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PytestUnhandledCoroutineWarning